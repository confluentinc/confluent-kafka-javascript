{{- if .Values.createTopics }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ckjs-perf-scale.createTopicsJobName" . }}
  labels:
    {{- include "ckjs-perf-scale.labels" . | nindent 4 }}
    app.kubernetes.io/component: create-topics
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  parallelism: 1
  completions: 1
  backoffLimit: 0
  template:
    metadata:
      labels:
        {{- include "ckjs-perf-scale.labels" . | nindent 8 }}
        app.kubernetes.io/component: create-topics
    spec:
      restartPolicy: Never
      {{- if .Values.nodeArch }}
      {{- include "ckjs-perf-scale.nodeArchAffinity" . | nindent 6 }}
      {{- end }}
      containers:
        - name: create-topics
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: KAFKA_BROKERS
              value: {{ .Values.kafka.brokers | quote }}
            - name: SECURITY_PROTOCOL
              value: {{ .Values.kafka.securityProtocol | quote }}
            - name: SASL_USERNAME
              value: {{ .Values.kafka.saslUsername | quote }}
            - name: SASL_PASSWORD
              value: {{ required "kafka.saslPassword is required" .Values.kafka.saslPassword | quote }}
            - name: KAFKA_TOPIC
              value: {{ .Values.kafka.topic | quote }}
            {{- if .Values.kafka.topic2 }}
            - name: KAFKA_TOPIC2
              value: {{ .Values.kafka.topic2 | quote }}
            {{- end }}
            - name: MODE
              value: {{ .Values.producer.mode | quote }}
            - name: PARTITIONS
              value: {{ .Values.producer.partitions | quote }}
          workingDir: /opt/ckjs/examples/performance
          {{- if and .Values.consumer .Values.consumer.produceToSecondTopic }}
          command: ["node", "performance-consolidated.js", "--create-topics", "--produce-to-second-topic"]
          {{- else }}
          command: ["node", "performance-consolidated.js", "--create-topics"]
          {{- end }}
{{- end }}
