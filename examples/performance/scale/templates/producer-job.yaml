apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ckjs-perf-scale.producerJobName" . }}
  labels:
    {{- include "ckjs-perf-scale.labels" . | nindent 4 }}
    app.kubernetes.io/component: producer
spec:
  parallelism: {{ .Values.replicaCount }}
  completions: {{ .Values.replicaCount }}
  backoffLimit: 0
  template:
    metadata:
      labels:
        {{- include "ckjs-perf-scale.labels" . | nindent 8 }}
        app.kubernetes.io/component: producer
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: {{ .Values.logKeeper.terminationGracePeriodSeconds }}
      volumes:
        - name: workspace
          emptyDir: {}
      initContainers:
        - name: setup
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: SOURCE_REPO
              value: {{ .Values.source.repo | quote }}
            - name: SOURCE_REF
              value: {{ .Values.source.ref | quote }}
            - name: DEBIAN_FRONTEND
              value: noninteractive
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -eo pipefail
              apt-get update
              apt-get install -y --no-install-recommends \
                curl git build-essential python3 ca-certificates \
                libssl-dev libcurl4-openssl-dev zlib1g-dev libsasl2-dev libzstd-dev
              export NVM_DIR=/workspace/nvm
              mkdir -p "$NVM_DIR"
              curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh \
                | PROFILE=/dev/null bash
              . "$NVM_DIR/nvm.sh"
              nvm install --lts
              nvm use --lts
              cd /workspace
              git clone "$SOURCE_REPO" repo
              cd repo
              git checkout "$SOURCE_REF"
              git submodule update --init --recursive
              CKJS_LINKING=dynamic npm install --build-from-source=@confluentinc/kafka-javascript
              cd examples/performance
              npm install
              echo "===== init complete ====="
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        # Native sidecar (restartPolicy: Always on an initContainer).
        # Stays alive after the main `producer` container exits so that
        # scale.py can `kubectl cp` the producer's log files out of the
        # shared workspace volume. The grace period above (`terminationGrace
        # PeriodSeconds`) bounds how long it lingers.
        - name: log-keeper
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          restartPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Stay alive after the producer (main) container exits so that
              # scale.py can kubectl-cp log files out of /workspace.  The
              # kubelet sends SIGTERM to native sidecars as soon as the main
              # container exits; we trap it to ignore (the trap fires but
              # runs the `:` no-op) and instead exit when scale.py touches
              # /workspace/.shutdown.  terminationGracePeriodSeconds bounds
              # how long we'll linger if scale.py never signals us.
              trap : TERM
              while [ ! -f /workspace/.shutdown ]; do
                sleep 5
              done
              exit 0
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      containers:
        - name: producer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "ckjs-perf-scale.configMapName" . }}
            - secretRef:
                name: {{ include "ckjs-perf-scale.secretName" . }}
          env:
            - name: DEBIAN_FRONTEND
              value: noninteractive
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -eo pipefail
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates libssl3 libcurl4 zlib1g libsasl2-2 libzstd1
              export NVM_DIR=/workspace/nvm
              . "$NVM_DIR/nvm.sh"
              cd /workspace/repo/examples/performance
              exec node performance-consolidated.js --producer
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
