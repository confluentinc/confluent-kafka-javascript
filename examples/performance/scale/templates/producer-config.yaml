apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ckjs-perf-scale.producerConfigMapName" . }}
  labels:
    {{- include "ckjs-perf-scale.labels" . | nindent 4 }}
data:
  # Extra librdkafka producer properties, applied after the higher-latency
  # cluster tuning in newCompatibleProducer (so they take precedence).
  # newCompatibleProducer reads this file (PRODUCER_CONFIG_FILE).
  configuration.yaml: |
{{ .Values.producer.config | default list | toYaml | indent 4 }}
